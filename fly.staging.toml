# fly.staging.toml — DevComms AI staging environment
# Auto-deployed on push to main. Separate from production.
# Docs: https://fly.io/docs/reference/configuration/

app = "devcomms-api-staging"
primary_region = "ams"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "staging"
  PORT = "3000"
  DATABASE_URL = "file:/data/staging.db"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
