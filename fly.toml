# fly.toml — DevComms AI production deployment
# Docs: https://fly.io/docs/reference/configuration/
#
# Domain: devcomms.ai (provisioned via `flyctl certs create devcomms.ai`)
# Staging config: fly.staging.toml
# Provisioning script: scripts/provision-fly-resources.sh

app = "devcomms-api"
primary_region = "ams"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DATABASE_URL = "file:/data/prod.db"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
