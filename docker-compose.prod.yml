version: '3.9'

# Production-like deployment for local validation.
# In actual production, Railway manages PostgreSQL and Redis.
# This file is for testing the production Docker image locally.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - DATABASE_URL=${DATABASE_URL:-postgresql://dra:dra@postgres:5432/dra}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dra}
      POSTGRES_DB: ${POSTGRES_DB:-dra}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dra}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
